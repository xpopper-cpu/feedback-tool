<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>平板问题反馈收集</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: #f5f6f8; min-height: 100vh; display: flex; justify-content: center; padding: 24px 16px;
}
.card {
  background: #fff; border-radius: 16px; box-shadow: 0 2px 16px rgba(0,0,0,0.06);
  max-width: 640px; width: 100%; padding: 32px 28px;
}
h1 { font-size: 22px; color: #1f1f1f; margin-bottom: 6px; }
.sub { font-size: 13px; color: #999; margin-bottom: 24px; }
.hint { font-size: 12px; color: #bbb; margin-bottom: 12px; }
textarea {
  width: 100%; min-height: 160px; border: 1.5px solid #e5e6eb;
  border-radius: 10px; padding: 14px 16px; font-size: 14px;
  line-height: 1.7; resize: vertical; outline: none; color: #333;
  transition: border-color 0.2s;
}
textarea:focus { border-color: #3370ff; }
.btn-wrap { margin-top: 16px; display: flex; align-items: center; gap: 12px; }
button {
  background: #3370ff; color: #fff; border: none; border-radius: 8px;
  padding: 10px 32px; font-size: 15px; cursor: pointer; font-weight: 500;
  transition: background 0.2s;
}
button:hover { background: #2860e0; }
button:disabled { background: #a0c0ff; cursor: not-allowed; }
.status { font-size: 13px; }
.status.ok { color: #0a0; }
.status.err { color: #e33; }
</style>
</head>
<body>
<div class="card">
  <h1>平板问题反馈收集</h1>
  <p class="sub">粘贴微信群反馈消息，自动写入飞书表格</p>
  <p class="hint">多条消息用换行分隔，系统自动判断分类和优先级</p>
  <textarea id="input" placeholder="把群消息粘贴到这里&#10;&#10;示例：&#10;伴学师：三年级英语课件的音频播放不了&#10;用户：平板充不进电了"></textarea>
  <div class="btn-wrap">
    <button id="submitBtn" onclick="submit()">提交到表格</button>
    <span id="status" class="status"></span>
  </div>
</div>

<script>
async function submit() {
  const btn = document.getElementById('submitBtn');
  const status = document.getElementById('status');
  const text = document.getElementById('input').value.trim();

  if (!text) { status.className = 'status err'; status.textContent = '请先输入内容'; return; }

  btn.disabled = true; btn.textContent = '提交中...';
  status.className = 'status'; status.textContent = '';

  try {
    const resp = await fetch('/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    const data = await resp.json();

    if (data.ok) {
      status.className = 'status ok';
      status.textContent = `已成功写入 ${data.written} 条记录`;
      document.getElementById('input').value = '';
    } else {
      status.className = 'status err';
      status.textContent = data.error || '提交失败';
    }
  } catch (e) {
    status.className = 'status err';
    status.textContent = '网络错误，请重试';
  }

  btn.disabled = false; btn.textContent = '提交到表格';
}
</script>
</body>
</html>
